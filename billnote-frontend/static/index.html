<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BillNote | 請求書管理</title>
    <style>
      :root {
        /* 少しだけ色を濃く調整 */
        --primary-green: #e2f0e9; /* 背景：少し濃く */
        --accent-green: #4e9a6d; /* メイン色：より深みのある緑 */
        --border-green: #bcd2c5; /* 線：はっきり見える色 */
        --text-dark: #2c3e50;
      }

      body {
        font-family: "Helvetica Neue", Arial, sans-serif;
        background-color: var(--primary-green);
        color: var(--text-dark);
        margin: 0;
        display: flex;
        justify-content: center;
        min-height: 100vh;
      }

      .container {
        width: 100%;
        max-width: 1100px;
        background: white;
        margin: 40px 20px;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        border: 1px solid var(--border-green);
      }

      .header {
        display: flex;
        align-items: center;
        margin-bottom: 40px;
        border-bottom: 3px solid var(--primary-green);
        padding-bottom: 20px;
      }

      .logo {
        font-size: 30px;
        font-weight: bold;
        color: var(--accent-green);
        letter-spacing: 2px;
        display: flex;
        align-items: center;
      }

      .logo-icon {
        width: 32px;
        height: 32px;
        background-color: var(--accent-green);
        border-radius: 4px;
        margin-right: 15px;
      }

      .section-box {
        background-color: #f8fbf9;
        padding: 25px;
        border-radius: 10px;
        border: 1.5px solid var(--border-green); /* 線を少し太く濃く */
        margin-bottom: 25px;
      }

      h2 {
        font-size: 18px;
        color: var(--accent-green);
        border-left: 5px solid var(--accent-green);
        padding-left: 12px;
        margin-bottom: 20px;
      }

      input,
      select {
        padding: 10px;
        border: 1.5px solid var(--border-green);
        border-radius: 6px;
        background: white;
      }

      button {
        background-color: var(--accent-green);
        color: white;
        border: none;
        padding: 11px 22px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
      }

      button:hover {
        filter: brightness(0.9);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background: white;
      }
      th {
        background-color: var(--primary-green);
        padding: 15px;
        border: 1px solid var(--border-green);
        text-align: left;
      }
      td {
        padding: 12px;
        border: 1px solid var(--border-green);
      }

      .id-link {
        color: var(--accent-green);
        text-decoration: none;
        font-weight: bold;
        cursor: pointer;
        border-bottom: 2px solid var(--primary-green);
      }
      .id-link:hover {
        background: var(--primary-green);
      }

      #message {
        margin-top: 15px;
        padding: 12px;
        border-radius: 6px;
        display: none;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">
          <div class="logo-icon"></div>
          BILLNOTE
        </div>
      </div>

      <div class="section-box">
        <h2>請求書の登録</h2>
        <form
          id="uploadForm"
          style="
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
          "
        >
          <div>
            <label>対象年</label><br /><input
              type="number"
              id="year"
              value="2026"
              style="width: 90px"
            />
          </div>
          <div>
            <label>対象月</label><br /><select id="month" style="width: 90px">
              <option value="1">1月</option>
              <option value="2">2月</option>
              <option value="3">3月</option>
              <option value="4">4月</option>
              <option value="5">5月</option>
              <option value="6">6月</option>
              <option value="7">7月</option>
              <option value="8">8月</option>
              <option value="9">9月</option>
              <option value="10">10月</option>
              <option value="11">11月</option>
              <option value="12">12月</option>
            </select>
          </div>
          <div>
            <label>エクセルファイル</label><br /><input
              type="file"
              id="excelFile"
              accept=".xlsx"
            />
          </div>
          <button type="submit">アップロード実行</button>
        </form>
        <div id="message"></div>
      </div>

      <div class="section-box">
        <h2>請求書の検索・一覧</h2>
        <div
          style="
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
          "
        >
          <input
            type="number"
            id="searchYear"
            value="2026"
            style="width: 90px"
          />
          <select id="searchMonth" style="width: 90px">
            <option value="1">1月</option>
            <option value="2">2月</option>
            <option value="3">3月</option>
            <option value="4">4月</option>
            <option value="5">5月</option>
            <option value="6">6月</option>
            <option value="7">7月</option>
            <option value="8">8月</option>
            <option value="9">9月</option>
            <option value="10">10月</option>
            <option value="11">11月</option>
            <option value="12">12月</option>
          </select>
          <button onclick="searchInvoices('month')">年月で検索</button>
          <div
            style="width: 2px; height: 30px; background: var(--border-green)"
          ></div>
          <input
            type="text"
            id="searchName"
            placeholder="顧客名を入力"
            style="width: 200px"
          />
          <button
            onclick="searchInvoices('customer')"
            style="background-color: #5d6d7e"
          >
            氏名で検索
          </button>
        </div>

        <table>
          <thead>
            <tr>
              <th style="width: 100px">顧客ID</th>
              <th style="width: 80px">請求月</th>
              <th>氏名</th>
              <th>住所</th>
              <th>電話番号</th>
              <th style="width: 100px">金額</th>
              <th style="width: 80px">請求書</th>
            </tr>
          </thead>
          <tbody id="resultTable"></tbody>
        </table>
      </div>
    </div>

    <script>
      // --- アップロード処理 ---
      document.getElementById("uploadForm").onsubmit = async (e) => {
        e.preventDefault();
        const msg = document.getElementById("message");
        const fileInput = document.getElementById("excelFile");
        if (!fileInput.files[0]) return alert("ファイルを選択してください");

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        formData.append("year", document.getElementById("year").value);
        formData.append("month", document.getElementById("month").value);

        try {
          const res = await fetch("/upload", {
            method: "POST",
            body: formData,
          });
          const data = await res.json();
          msg.style.display = "block";
          if (res.ok) {
            msg.textContent =
              "【成功】 " +
              data.data.customer_name +
              " 様のデータを登録しました。";
            msg.style.backgroundColor = "#e8f5e9";
            msg.style.color = "#2e7d32";
            msg.style.border = "1px solid #c8e6c9";
          } else {
            msg.textContent = "【エラー】 " + data.detail;
            msg.style.backgroundColor = "#ffebee";
            msg.style.color = "#c62828";
            msg.style.border = "1px solid #ffcdd2";
          }
        } catch (err) {
          alert("サーバーとの通信に失敗しました。");
        }
      };

      // --- 検索処理 ---
      async function searchInvoices(type, val = null) {
        let url = "";
        if (type === "month") {
          url = `/search/month?year=${document.getElementById("searchYear").value}&month=${document.getElementById("searchMonth").value}`;
        } else if (type === "customer") {
          const name = document.getElementById("searchName").value;
          if (!name) return alert("氏名を入力してください");
          url = `/search/customer?name=${encodeURIComponent(name)}`;
        } else if (type === "id") {
          url = `/search/customer_id?customer_id=${val}`;
        }

        const tbody = document.getElementById("resultTable");
        tbody.innerHTML =
          '<tr><td colspan="7" style="text-align:center;">データを取得中...</td></tr>';

        try {
          const res = await fetch(url);
          const data = await res.json();
          tbody.innerHTML = "";

          if (!data.results || data.results.length === 0) {
            tbody.innerHTML =
              '<tr><td colspan="7" style="text-align:center;">該当するデータはありません</td></tr>';
            return;
          }

          data.results.forEach((item) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                    <td><a class="id-link" onclick="searchInvoices('id', '${item.customer_id}')" title="この顧客の履歴を表示">${item.customer_id.substring(0, 8)}</a></td>
                    <td>${item.invoice_month}</td>
                    <td><b>${item.customer_name}</b></td>
                    <td style="font-size: 11px; max-width: 200px;">${item.address || "-"}</td>
                    <td>${item.phone || "-"}</td>
                    <td style="text-align: right; font-weight: bold;">${item.total_amount.toLocaleString()}円</td>
                    <td style="text-align: center;">
                        <a href="/download?s3_path=${encodeURIComponent(item.s3_path)}" target="_blank">
                            <button style="padding: 5px 10px; font-size: 12px; background:#17a2b8;">保存</button>
                        </a>
                    </td>
                `;
            tbody.appendChild(tr);
          });
        } catch (err) {
          alert("検索中にエラーが発生しました。");
        }
      }
    </script>
  </body>
</html>
