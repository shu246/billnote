<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BillNote | 請求書管理</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo-icon">B</div>
        <div class="logo-text">BillNote</div>
      </div>

      <div class="section-box">
        <h2>請求書の登録</h2>

        <div class="mode-tabs">
          <button
            type="button"
            id="modeFile"
            class="btn-mode active"
            onclick="toggleMode('file')"
          >
            ファイル単位
          </button>
          <button
            type="button"
            id="modeFolder"
            class="btn-mode"
            onclick="toggleMode('folder')"
          >
            フォルダー単位
          </button>
        </div>

        <form id="uploadForm" class="upload-form-grid">
          <div>
            <label class="form-label">対象年</label><br />
            <input type="number" id="year" value="2026" style="width: 85px" />
          </div>
          <div>
            <label class="form-label">対象月</label><br />
            <select id="month" style="width: 85px">
              <option value="1">1月</option>
              <option value="2">2月</option>
              <option value="3">3月</option>
              <option value="4">4月</option>
              <option value="5">5月</option>
              <option value="6">6月</option>
              <option value="7">7月</option>
              <option value="8">8月</option>
              <option value="9">9月</option>
              <option value="10">10月</option>
              <option value="11">11月</option>
              <option value="12">12月</option>
            </select>
          </div>
          <div style="flex-grow: 1">
            <label id="inputLabel" class="form-label"
              >エクセルファイルを選択</label
            ><br />
            <input
              type="file"
              id="fileInput"
              accept=".xlsx"
              multiple
              style="display: block; width: 100%"
            />
            <input
              type="file"
              id="folderInput"
              webkitdirectory
              style="display: none; width: 100%"
            />
          </div>
          <button type="submit" class="btn-main">アップロード開始</button>
        </form>

        <div id="selectionDisplay">未選択</div>

        <div id="progressArea" class="progress-wrapper">
          <div class="progress-outer">
            <div id="progressGauge" class="progress-inner"></div>
          </div>
          <div class="progress-labels">
            <span id="progressPercent">0%</span>
            <span id="progressCount">0 / 0</span>
          </div>
        </div>
        <div id="message"></div>
      </div>

      <div class="section-box">
        <h2>請求書の検索・一覧</h2>
        <div class="search-form-flex">
          <input
            type="number"
            id="searchYear"
            value="2026"
            style="width: 85px"
          />
          <select id="searchMonth" style="width: 85px">
            <option value="1">1月</option>
            <option value="2">2月</option>
            <option value="3">3月</option>
            <option value="4">4月</option>
            <option value="5">5月</option>
            <option value="6">6月</option>
            <option value="7">7月</option>
            <option value="8">8月</option>
            <option value="9">9月</option>
            <option value="10">10月</option>
            <option value="11">11月</option>
            <option value="12">12月</option>
          </select>
          <button class="btn-main" onclick="searchInvoices('month')">
            年月で検索
          </button>
          <div class="search-divider"></div>
          <input
            type="text"
            id="searchName"
            placeholder="顧客名（苗字のみ可）"
            style="width: 180px"
          />
          <button
            class="btn-main"
            onclick="searchInvoices('customer')"
            style="background-color: #5d6d7e"
          >
            氏名で検索
          </button>
        </div>

        <table class="result-table-spec">
          <thead>
            <tr>
              <th style="width: 90px">顧客ID</th>
              <th style="width: 80px">請求月</th>
              <th>氏名</th>
              <th>住所</th>
              <th>電話番号</th>
              <th style="width: 100px">金額</th>
              <th style="width: 70px">操作</th>
            </tr>
          </thead>
          <tbody id="resultTable"></tbody>
        </table>
      </div>
    </div>

    <script src="/static/script.js"></script>
  </body>
</html>
