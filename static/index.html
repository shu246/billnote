<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BillNote | 請求書管理</title>
    <style>
      :root {
        --primary-green: #e2f0e9;
        --accent-green: #4e9a6d;
        --border-green: #bcd2c5;
        --text-dark: #2c3e50;
      }
      body {
        font-family: "Helvetica Neue", Arial, sans-serif;
        background-color: var(--primary-green);
        color: var(--text-dark);
        margin: 0;
        display: flex;
        justify-content: center;
        min-height: 100vh;
      }
      .container {
        width: 100%;
        max-width: 1100px;
        background: white;
        margin: 40px 20px;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        border: 1px solid var(--border-green);
      }
      .header {
        display: flex;
        align-items: center;
        margin-bottom: 40px;
        border-bottom: 3px solid var(--primary-green);
        padding-bottom: 20px;
      }
      .logo {
        font-size: 30px;
        font-weight: bold;
        color: var(--accent-green);
        letter-spacing: 2px;
        display: flex;
        align-items: center;
      }
      .logo-icon {
        width: 32px;
        height: 32px;
        background-color: var(--accent-green);
        border-radius: 4px;
        margin-right: 15px;
      }
      .section-box {
        background-color: #f8fbf9;
        padding: 25px;
        border-radius: 10px;
        border: 1.5px solid var(--border-green);
        margin-bottom: 25px;
      }
      h2 {
        font-size: 18px;
        color: var(--accent-green);
        border-left: 5px solid var(--accent-green);
        padding-left: 12px;
        margin-bottom: 20px;
      }

      /* 入力フォームのレイアウト調整 */
      .upload-form-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        align-items: flex-end;
        margin-bottom: 15px;
      }

      input,
      select {
        padding: 10px;
        border: 1.5px solid var(--border-green);
        border-radius: 6px;
        background: white;
        height: 42px; /* 高さを統一 */
        box-sizing: border-box;
      }

      .mode-selector {
        margin-bottom: 15px;
        display: flex;
        gap: 10px;
      }
      .mode-btn {
        background: #fff;
        color: var(--accent-green);
        border: 1px solid var(--accent-green);
        padding: 8px 16px;
        font-size: 13px;
        cursor: pointer;
        border-radius: 6px;
      }
      .mode-btn.active {
        background: var(--accent-green);
        color: #fff;
      }

      button {
        background-color: var(--accent-green);
        color: white;
        border: none;
        padding: 0 22px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
        height: 42px; /* 入力欄と高さを合わせる */
      }
      button:hover {
        filter: brightness(0.9);
      }

      #selectionDisplay {
        display: block;
        font-size: 13px;
        color: #444;
        background: #fff;
        padding: 15px;
        border-radius: 6px;
        border: 1px solid var(--border-green);
        min-height: 50px;
        word-break: break-all;
      }

      .progress-container {
        width: 100%;
        background-color: #eee;
        border-radius: 10px;
        margin: 15px 0;
        display: none;
        overflow: hidden;
      }
      .progress-bar {
        width: 0%;
        height: 12px;
        background-color: var(--accent-green);
        transition: width 0.3s ease;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background: white;
      }
      th {
        background-color: var(--primary-green);
        padding: 15px;
        border: 1px solid var(--border-green);
        text-align: left;
      }
      td {
        padding: 12px;
        border: 1px solid var(--border-green);
      }
      .id-link {
        color: var(--accent-green);
        text-decoration: none;
        font-weight: bold;
        cursor: pointer;
        border-bottom: 2px solid var(--primary-green);
      }

      #message {
        margin-top: 15px;
        padding: 12px;
        border-radius: 6px;
        display: none;
        border: 1px solid var(--border-green);
        background-color: #f8fbf9;
        max-height: 300px;
        overflow-y: auto;
      }
      .status-list {
        padding-left: 20px;
        font-size: 13px;
        list-style: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">
          <div class="logo-icon"></div>
          BILLNOTE
        </div>
      </div>

      <div class="section-box">
        <h2>請求書の登録</h2>
        <div class="mode-selector">
          <button
            type="button"
            class="mode-btn active"
            id="fileModeBtn"
            onclick="toggleMode('file')"
          >
            📄 ファイル単位
          </button>
          <button
            type="button"
            class="mode-btn"
            id="folderModeBtn"
            onclick="toggleMode('folder')"
          >
            📁 フォルダー単位
          </button>
        </div>

        <form id="uploadForm" class="upload-form-grid">
          <div>
            <label style="font-size: 12px; font-weight: bold">対象年</label
            ><br />
            <input type="number" id="year" value="2026" style="width: 90px" />
          </div>
          <div>
            <label style="font-size: 12px; font-weight: bold">対象月</label
            ><br />
            <select id="month" style="width: 90px">
              <option value="1">1月</option>
              <option value="2">2月</option>
              <option value="3">3月</option>
              <option value="4">4月</option>
              <option value="5">5月</option>
              <option value="6">6月</option>
              <option value="7">7月</option>
              <option value="8">8月</option>
              <option value="9">9月</option>
              <option value="10">10月</option>
              <option value="11">11月</option>
              <option value="12">12月</option>
            </select>
          </div>
          <div style="flex-grow: 1; min-width: 250px">
            <label id="inputLabel" style="font-size: 12px; font-weight: bold"
              >エクセルファイルを選択</label
            ><br />
            <input
              type="file"
              id="fileInput"
              accept=".xlsx"
              multiple
              style="display: block; width: 100%"
            />
            <input
              type="file"
              id="folderInput"
              webkitdirectory
              style="display: none; width: 100%"
            />
          </div>
          <button type="submit">アップロード開始</button>
        </form>

        <div id="selectionDisplay">未選択</div>

        <div id="progressWrapper" style="display: none; margin-top: 20px">
          <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
          </div>
          <div
            id="progressText"
            style="
              font-size: 12px;
              color: var(--accent-green);
              text-align: right;
              margin-top: 5px;
            "
          >
            0%
          </div>
        </div>
        <div id="message"></div>
      </div>

      <div class="section-box">
        <h2>請求書の検索</h2>
        <div
          style="
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
          "
        >
          <input
            type="number"
            id="searchYear"
            value="2026"
            style="width: 90px"
          />
          <select id="searchMonth" style="width: 90px">
            <option value="1">1月</option>
            <option value="2">2月</option>
            <option value="3">3月</option>
            <option value="4">4月</option>
            <option value="5">5月</option>
            <option value="6">6月</option>
            <option value="7">7月</option>
            <option value="8">8月</option>
            <option value="9">9月</option>
            <option value="10">10月</option>
            <option value="11">11月</option>
            <option value="12">12月</option>
          </select>
          <button onclick="searchInvoices('month')">年月で検索</button>
          <div
            style="width: 2px; height: 30px; background: var(--border-green)"
          ></div>
          <input
            type="text"
            id="searchName"
            placeholder="顧客名を入力"
            style="width: 200px"
          />
          <button
            onclick="searchInvoices('customer')"
            style="background-color: #5d6d7e"
          >
            氏名で検索
          </button>
        </div>

        <table>
          <thead>
            <tr>
              <th style="width: 100px">顧客ID</th>
              <th style="width: 80px">請求月</th>
              <th>氏名</th>
              <th>住所</th>
              <th>電話番号</th>
              <th style="width: 100px">金額</th>
              <th style="width: 80px">請求書</th>
            </tr>
          </thead>
          <tbody id="resultTable"></tbody>
        </table>
      </div>
    </div>

    <script>
      const apiBaseUrl =
        "https://6ssxr2dq8d.execute-api.ap-northeast-1.amazonaws.com/default/billnote-api";
      let currentMode = "file";

      function toggleMode(mode) {
        currentMode = mode;
        const fileInp = document.getElementById("fileInput");
        const folderInp = document.getElementById("folderInput");
        const display = document.getElementById("selectionDisplay");
        const label = document.getElementById("inputLabel");

        document
          .getElementById("fileModeBtn")
          .classList.toggle("active", mode === "file");
        document
          .getElementById("folderModeBtn")
          .classList.toggle("active", mode === "folder");

        if (mode === "file") {
          fileInp.style.display = "block";
          folderInp.style.display = "none";
          label.textContent = "エクセルファイルを選択 (複数可)";
        } else {
          fileInp.style.display = "none";
          folderInp.style.display = "block";
          label.textContent = "フォルダーを選択してください";
        }

        fileInp.value = "";
        folderInp.value = "";
        display.textContent = "未選択";
      }

      function updateDisplay(e) {
        const display = document.getElementById("selectionDisplay");
        const files = Array.from(e.target.files);

        if (files.length === 0) {
          display.textContent = "未選択";
          return;
        }

        const excelFiles = files.filter((f) => f.name.endsWith(".xlsx"));

        if (currentMode === "folder") {
          // 不明なフォルダー対策: パスを分解して親を取得
          let folderName = "選択されたフォルダ";
          const firstFile = files.find((f) => f.webkitrelativepath);
          if (firstFile) {
            folderName = firstFile.webkitrelativepath.split("/")[0];
          }

          display.innerHTML =
            `📁 フォルダー名: <strong style="color:var(--accent-green);">${folderName}</strong><br>` +
            `<small>Excelファイル (${excelFiles.length}件): ${excelFiles.map((f) => f.name).join(", ")}</small>`;
        } else {
          // ファイル名を下の欄に一覧表示
          display.innerHTML =
            `📄 選択されたファイル (${excelFiles.length}件):<br>` +
            `<small>${excelFiles.map((f) => f.name).join(", ")}</small>`;
        }
      }

      document
        .getElementById("fileInput")
        .addEventListener("change", updateDisplay);
      document
        .getElementById("folderInput")
        .addEventListener("change", updateDisplay);

      // アップロード
      document.getElementById("uploadForm").onsubmit = async (e) => {
        e.preventDefault();
        const activeInput =
          currentMode === "file"
            ? document.getElementById("fileInput")
            : document.getElementById("folderInput");
        const files = Array.from(activeInput.files).filter((f) =>
          f.name.endsWith(".xlsx"),
        );
        if (files.length === 0)
          return alert("送信するExcelファイルがありません");

        const msg = document.getElementById("message");
        const progBar = document.getElementById("progressBar");
        const progText = document.getElementById("progressText");

        msg.style.display = "block";
        msg.innerHTML =
          "<strong>処理状況:</strong><ul id='statusList' class='status-list'></ul>";
        document.getElementById("progressWrapper").style.display = "block";
        const statusList = document.getElementById("statusList");

        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          const li = document.createElement("li");
          li.textContent = `⏳ [${i + 1}/${files.length}] ${file.name}`;
          statusList.appendChild(li);

          const formData = new FormData();
          formData.append("file", file);
          formData.append("year", document.getElementById("year").value);
          formData.append("month", document.getElementById("month").value);

          try {
            const res = await fetch(apiBaseUrl + "/upload", {
              method: "POST",
              body: formData,
            });
            li.innerHTML = res.ok
              ? `<span style="color: #2e7d32;">✔ ${file.name} 完了</span>`
              : `<span style="color: #c62828;">✘ ${file.name} 失敗</span>`;
          } catch (err) {
            li.innerHTML = `<span style="color: #c62828;">✘ エラー</span>`;
          }

          const percent = Math.round(((i + 1) / files.length) * 100);
          progBar.style.width = percent + "%";
          progText.textContent = `${percent}% (${i + 1}/${files.length})`;
          msg.scrollTop = msg.scrollHeight;
        }
      };

      // 検索（元のロジックを復元）
      async function searchInvoices(type, val = null) {
        let url = "";
        if (type === "month") {
          url = `${apiBaseUrl}/search/month?year=${document.getElementById("searchYear").value}&month=${document.getElementById("searchMonth").value}`;
        } else if (type === "customer") {
          const name = document.getElementById("searchName").value;
          if (!name) return alert("氏名を入力してください");
          url = `${apiBaseUrl}/search/customer?name=${encodeURIComponent(name)}`;
        } else if (type === "id") {
          url = `${apiBaseUrl}/search/customer_id?customer_id=${val}`;
        }

        const tbody = document.getElementById("resultTable");
        tbody.innerHTML =
          '<tr><td colspan="7" style="text-align:center;">読み込み中...</td></tr>';

        try {
          const res = await fetch(url);
          const data = await res.json();
          tbody.innerHTML = "";
          if (!data.results || data.results.length === 0) {
            tbody.innerHTML =
              '<tr><td colspan="7" style="text-align:center;">該当なし</td></tr>';
            return;
          }
          data.results.forEach((item) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><a class="id-link" onclick="searchInvoices('id', '${item.customer_id}')">${item.customer_id.substring(0, 8)}</a></td>
                <td>${item.invoice_month}</td>
                <td><b>${item.customer_name}</b></td>
                <td style="font-size: 11px;">${item.address || "-"}</td>
                <td>${item.phone || "-"}</td>
                <td style="text-align: right;">${item.total_amount.toLocaleString()}円</td>
                <td style="text-align: center;">
                    <a href="${apiBaseUrl}/download?s3_path=${encodeURIComponent(item.s3_path)}" target="_blank">
                        <button style="padding: 0 10px; font-size: 12px; background:#17a2b8; height:30px;">保存</button>
                    </a>
                </td>`;
            tbody.appendChild(tr);
          });
        } catch (err) {
          alert("エラーが発生しました");
        }
      }
    </script>
  </body>
</html>
